name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: postcaster
      PLUGIN_DIR: .
      WPORG_USERNAME: ${{ secrets.WPORG_USERNAME }}
      WPORG_PASSWORD: ${{ secrets.WPORG_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" ]]; then
            echo "No release tag matching v* was found."
            exit 1
          fi

          version="${tag#v}"
          sha="$(git rev-list -n1 "$tag")"

          if [[ -z "$sha" ]]; then
            echo "Could not resolve commit for tag ${tag}."
            exit 1
          fi

          source_dir="${RUNNER_TEMP}/release-source"
          rm -rf "$source_dir"
          mkdir -p "$source_dir"
          git archive "$tag" | tar -x -C "$source_dir"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "source_dir=${source_dir}" >> "$GITHUB_OUTPUT"

      - name: Verify tag commit is on master
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master

          if ! git branch -r --contains "${{ steps.target.outputs.sha }}" | grep -Eq 'origin/master$'; then
            echo "Tag ${{ steps.target.outputs.tag }} does not point to a commit on master."
            exit 1
          fi

      - name: Validate release versions
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${{ steps.target.outputs.version }}"
          plugin_file="${{ steps.target.outputs.source_dir }}/${PLUGIN_SLUG}.php"
          readme_file="${{ steps.target.outputs.source_dir }}/readme.txt"

          plugin_version="$(awk -F': ' '/^[[:space:]\/\*#@]*Version:/ { print $2; exit }' "$plugin_file")"
          readme_version="$(awk -F': ' '/^Stable tag:/ { print $2; exit }' "$readme_file")"

          if [[ -z "$plugin_version" ]]; then
            echo "Could not read Version header from ${plugin_file}."
            exit 1
          fi

          if [[ -z "$readme_version" ]]; then
            echo "Could not read Stable tag from ${readme_file}."
            exit 1
          fi

          if [[ "$tag_version" != "$plugin_version" ]]; then
            echo "Tag version (${tag_version}) does not match plugin version (${plugin_version})."
            exit 1
          fi

          if [[ "$tag_version" != "$readme_version" ]]; then
            echo "Tag version (${tag_version}) does not match readme stable tag (${readme_version})."
            exit 1
          fi

      - name: Build plugin zip
        shell: bash
        run: |
          php bin/build-release.php --source-root="${{ steps.target.outputs.source_dir }}"

      - name: Install SVN tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync unzip

      - name: Validate WordPress.org credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${WPORG_USERNAME}" ]]; then
            echo "Missing GitHub secret: WPORG_USERNAME"
            exit 1
          fi

          if [[ -z "${WPORG_PASSWORD}" ]]; then
            echo "Missing GitHub secret: WPORG_PASSWORD"
            exit 1
          fi

      - name: Deploy to WordPress.org SVN
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.target.outputs.version }}"
          zip_path="./dist/${PLUGIN_SLUG}-${{ steps.target.outputs.tag }}.zip"

          chmod +x bin/deploy-wporg.sh
          ./bin/deploy-wporg.sh "${PLUGIN_SLUG}" "${version}" "${zip_path}" "${WPORG_USERNAME}" "${WPORG_PASSWORD}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          generate_release_notes: true
          files: ./dist/${{ env.PLUGIN_SLUG }}-${{ steps.target.outputs.tag }}.zip
