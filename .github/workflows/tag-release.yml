name: Tag Release On Master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create version tag when missing
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk -F': ' '/^[[:space:]]*Version:/ { print $2; exit }' postcaster.php)"
          stable_tag="$(awk -F': ' '/^Stable tag:/ { print $2; exit }' readme.txt)"

          if [[ -z "$version" ]]; then
            echo "Could not read Version from postcaster.php."
            exit 1
          fi

          if [[ -z "$stable_tag" ]]; then
            echo "Could not read Stable tag from readme.txt."
            exit 1
          fi

          if [[ "$version" != "$stable_tag" ]]; then
            echo "Version ${version} does not match Stable tag ${stable_tag}."
            exit 1
          fi

          tag="v${version}"

          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"
